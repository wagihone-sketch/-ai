<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>عربيتي - دليل الصيانة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1A1D23;
    --bg-elev:#22262E;
    --card:#262B34;
    --card-2:#2E343F;
    --line:#383F4B;
    --ink:#E8E6E1;
    --ink-dim:#9CA3AF;
    --amber:#F5A623;
    --amber-dim:#7A551A;
    --red:#E84545;
    --green:#4CAF6E;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    height:100%;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    max-width:480px;
    margin:0 auto;
    position:relative;
    min-height:100vh;
    padding-bottom:84px;
  }
  .eyebrow{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.12em;
    font-size:11px;
    color:var(--amber);
    font-weight:600;
  }
  /* ===== TOP BAR ===== */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 18px 10px;
    background:var(--bg);
    position:sticky; top:0; z-index:50;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:38px;height:38px;border-radius:9px;
    background:linear-gradient(150deg,var(--amber),#c9821a);
    display:flex;align-items:center;justify-content:center;
    font-family:'Oswald'; font-weight:700; color:#1A1D23; font-size:18px;
    box-shadow:0 4px 14px rgba(245,166,35,.25);
  }
  .brand-name{font-family:'Oswald'; font-weight:600; font-size:18px; letter-spacing:.01em;}
  .brand-name span{color:var(--amber);}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--card);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-dim);
    cursor:pointer;
  }

  /* ===== SCREENS ===== */
  .screen{display:none; padding:0 18px 18px; animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* ===== GAUGE HERO (signature element) ===== */
  .gauge-hero{
    position:relative;
    background:radial-gradient(circle at 30% 20%, #2c323d, var(--bg-elev) 70%);
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px 20px 18px;
    margin:6px 0 18px;
    overflow:hidden;
  }
  .gauge-hero::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 14px);
    pointer-events:none;
  }
  .gauge-row{display:flex; align-items:center; gap:18px;}
  .gauge-dial{
    width:92px;height:92px;border-radius:50%;
    background:var(--bg);
    border:6px solid var(--card-2);
    position:relative;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .gauge-dial svg{position:absolute; inset:0;}
  .gauge-needle-val{font-family:'Oswald'; font-size:13px; font-weight:600; color:var(--ink); text-align:center; line-height:1.1;}
  .gauge-needle-val small{display:block; font-size:9px; color:var(--ink-dim); font-weight:400; margin-top:2px;}
  .gauge-text h2{font-family:'Tajawal'; font-weight:800; font-size:19px; margin-bottom:4px;}
  .gauge-text p{font-size:13px; color:var(--ink-dim); line-height:1.5;}
  .gauge-cta{
    margin-top:16px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(245,166,35,.08);
    border:1px dashed var(--amber-dim);
    border-radius:10px;
    padding:10px 14px;
  }
  .gauge-cta-text{font-size:12.5px; color:var(--amber);}
  .gauge-cta-text b{font-weight:800;}
  .gauge-cta button{
    background:var(--amber); color:#1A1D23; border:none;
    font-family:'Tajawal'; font-weight:700; font-size:12.5px;
    padding:7px 14px; border-radius:8px; cursor:pointer;
  }

  /* ===== SECTION LABEL ===== */
  .section-label{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:22px 0 12px;
  }
  .section-label h3{font-size:16px; font-weight:800;}
  .section-label a{font-size:12px; color:var(--amber); text-decoration:none;}

  /* ===== SEARCH ===== */
  .search-box{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:13px 16px;
    margin-bottom:6px;
  }
  .search-box input{
    background:transparent; border:none; outline:none; color:var(--ink);
    font-family:'Tajawal'; font-size:14px; width:100%;
  }
  .search-box input::placeholder{color:var(--ink-dim);}

  /* ===== CAR GRID ===== */
  .car-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .car-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    cursor:pointer;
    transition:border-color .15s, transform .15s;
    position:relative;
  }
  .car-card:active{transform:scale(.97);}
  .car-card.selected{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber);}
  .car-emoji{font-size:28px; display:block; margin-bottom:8px;}
  .car-card h4{font-size:14px; font-weight:700; margin-bottom:2px;}
  .car-card .car-meta{font-size:11px; color:var(--ink-dim);}
  .car-card .part-tag{
    position:absolute; top:10px; left:10px;
    font-family:'Oswald'; font-size:9px; color:var(--ink-dim);
    letter-spacing:.05em;
  }

  /* ===== PROCEDURE LIST (card like part number) ===== */
  .proc-list{display:flex; flex-direction:column; gap:10px;}
  .proc-card{
    display:flex; align-items:center; gap:13px;
    background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:13px;
    cursor:pointer;
  }
  .proc-card:active{background:var(--card-2);}
  .proc-num{
    font-family:'Oswald'; font-weight:700; font-size:11px;
    color:var(--bg); background:var(--amber);
    width:34px; height:34px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; letter-spacing:.02em;
  }
  .proc-info{flex:1;}
  .proc-info h5{font-size:14px; font-weight:700; margin-bottom:2px;}
  .proc-info span{font-size:11.5px; color:var(--ink-dim);}
  .proc-difficulty{display:flex; gap:3px; flex-shrink:0;}
  .dot{width:5px;height:5px;border-radius:50%; background:var(--line);}
  .dot.fill{background:var(--amber);}
  .chev{color:var(--ink-dim); font-size:18px; flex-shrink:0;}

  /* ===== BOTTOM NAV ===== */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0;
    max-width:480px; margin:0 auto;
    background:rgba(34,38,46,.92);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex; justify-content:space-around;
    padding:9px 6px 12px;
    z-index:60;
  }
  .nav-item{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--ink-dim); font-size:10.5px; font-weight:500;
    cursor:pointer; flex:1; padding:4px 0;
    transition:color .15s;
  }
  .nav-item svg{width:21px; height:21px;}
  .nav-item.active{color:var(--amber);}

  /* ===== DETAIL SCREEN ===== */
  .detail-header{
    display:flex; align-items:center; gap:12px;
    padding:16px 18px 14px;
    position:sticky; top:0; background:var(--bg); z-index:40;
  }
  .back-btn{
    width:36px;height:36px;border-radius:50%;background:var(--card);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; color:var(--ink);
  }
  .detail-title{flex:1;}
  .detail-title h2{font-size:17px; font-weight:800;}
  .detail-title span{font-size:12px; color:var(--ink-dim);}

  .video-frame{
    margin:0 18px 16px;
    aspect-ratio:16/9;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    color:var(--ink-dim);
    position:relative;
    overflow:hidden;
  }
  .play-circle{
    width:50px;height:50px;border-radius:50%;
    background:rgba(245,166,35,.15);
    border:2px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    color:var(--amber); font-size:18px;
  }

  /* ===== VIDEO BADGE (proc-card list) ===== */
  .video-badge{
    width:24px; height:24px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700;
  }
  .video-badge.has-video{ background:rgba(76,175,110,.15); color:var(--green); }
  .video-badge.no-video{ background:var(--card-2); border:1px dashed var(--line); color:var(--ink-dim); }

  /* ===== ADD VIDEO BUTTON (inside procedure detail) ===== */
  .add-video-btn{
    position:absolute; top:10px; left:10px;
    width:30px; height:30px; border-radius:50%;
    background:var(--amber); color:var(--bg);
    border:none; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:5;
    box-shadow:0 3px 10px rgba(245,166,35,.3);
  }
  .video-frame{ position:relative; }
  .video-frame.has-video{ background:#000; }
  .video-frame.has-video iframe{
    width:100%; height:100%; border:none; border-radius:14px;
  }
  .edit-video-btn{
    position:absolute; bottom:10px; left:10px;
    background:rgba(26,29,35,.85); color:var(--ink);
    border:1px solid var(--line); border-radius:8px;
    font-family:'Tajawal'; font-size:11px; font-weight:600;
    padding:6px 10px; cursor:pointer; z-index:5;
    display:flex; align-items:center; gap:5px;
  }

  /* ===== VIDEO LINK MODAL ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,11,14,.7);
    backdrop-filter:blur(3px);
    display:none; align-items:flex-end; justify-content:center;
    z-index:200;
  }
  .modal-overlay.active{display:flex;}
  .modal-sheet{
    width:100%; max-width:480px;
    background:var(--bg-elev); border:1px solid var(--line);
    border-radius:20px 20px 0 0;
    padding:20px 18px 28px;
    animation:sheetUp .22s ease;
  }
  @keyframes sheetUp{from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-handle{
    width:36px; height:4px; border-radius:3px; background:var(--line);
    margin:0 auto 16px;
  }
  .modal-sheet h4{font-size:15.5px; font-weight:800; margin-bottom:4px;}
  .modal-sheet p.modal-hint{font-size:12px; color:var(--ink-dim); margin-bottom:14px; line-height:1.6;}
  .modal-sheet input{
    width:100%; background:var(--card); border:1px solid var(--line); border-radius:11px;
    padding:13px 14px; color:var(--ink); font-family:'Tajawal'; font-size:13.5px;
    outline:none; margin-bottom:12px; direction:ltr; text-align:left;
  }
  .modal-sheet input:focus{border-color:var(--amber);}
  .modal-btn-row{display:flex; gap:9px;}
  .modal-btn-row button{
    flex:1; padding:13px; border-radius:11px; font-family:'Tajawal'; font-weight:700; font-size:13.5px;
    cursor:pointer; border:none;
  }
  .modal-save{background:var(--amber); color:var(--bg);}
  .modal-remove{background:rgba(232,69,69,.12); color:var(--red); border:1px solid rgba(232,69,69,.25) !important;}
  .modal-cancel{background:var(--card); color:var(--ink-dim); border:1px solid var(--line) !important;}

  .step-list{padding:0 18px; display:flex; flex-direction:column; gap:0;}
  .step{
    display:flex; gap:14px;
    padding:16px 0;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .step:last-child{border-bottom:none;}
  .step-marker{
    width:28px;height:28px;border-radius:50%;
    background:var(--card-2); border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:'Oswald'; font-size:12px; font-weight:700; color:var(--amber);
    flex-shrink:0;
  }
  .step.done .step-marker{background:var(--green); border-color:var(--green); color:#fff;}
  .step-body h6{font-size:14px; font-weight:700; margin-bottom:4px;}
  .step-body p{font-size:13px; color:var(--ink-dim); line-height:1.6;}
  .step-warn{
    margin-top:8px; display:flex; gap:6px; align-items:flex-start;
    background:rgba(232,69,69,.08); border:1px solid rgba(232,69,69,.25);
    border-radius:8px; padding:8px 10px; font-size:11.5px; color:#f29b9b;
  }

  .lang-toggle-row{
    display:flex; gap:8px; padding:0 18px 14px;
  }
  .lang-pill{
    flex:1; text-align:center; padding:8px; border-radius:9px;
    font-size:12px; font-weight:700; cursor:pointer;
    background:var(--card); border:1px solid var(--line); color:var(--ink-dim);
  }
  .lang-pill.active{background:var(--amber); color:var(--bg); border-color:var(--amber);}

  /* ===== GARAGE / TRACKER ===== */
  .garage-car{
    background:linear-gradient(135deg, var(--card), var(--card-2));
    border:1px solid var(--line); border-radius:16px;
    padding:18px; margin-bottom:16px;
  }
  .garage-car-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .garage-car h3{font-size:17px; font-weight:800;}
  .garage-car .plate{
    font-family:'Oswald'; font-size:11px; color:var(--ink-dim);
    border:1px solid var(--line); border-radius:6px; padding:3px 8px; margin-top:6px; display:inline-block;
  }
  .odo-pill{
    background:var(--bg); border:1px solid var(--line); border-radius:9px;
    padding:8px 12px; text-align:center;
  }
  .odo-pill b{font-family:'Oswald'; font-size:15px; display:block;}
  .odo-pill span{font-size:9px; color:var(--ink-dim);}

  .maint-item{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:13px; margin-bottom:9px;
  }
  .maint-icon{
    width:38px;height:38px;border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:17px;
    background:var(--card-2);
  }
  .maint-info{flex:1;}
  .maint-info h6{font-size:13.5px; font-weight:700;}
  .maint-info span{font-size:11px; color:var(--ink-dim);}
  .maint-status{font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:7px; flex-shrink:0;}
  .status-ok{background:rgba(76,175,110,.15); color:var(--green);}
  .status-soon{background:rgba(245,166,35,.15); color:var(--amber);}
  .status-due{background:rgba(232,69,69,.15); color:var(--red);}

  .add-fab{
    position:fixed; bottom:90px; left:50%; transform:translateX(calc(-50% + 200px));
    background:var(--amber); color:var(--bg); border:none; border-radius:50%;
    width:52px; height:52px; font-size:24px; font-weight:700;
    box-shadow:0 6px 18px rgba(245,166,35,.35); cursor:pointer; z-index:55;
    display:flex;align-items:center;justify-content:center;
  }

  /* ===== AI ASSISTANT ===== */
  .ai-header{
    text-align:center; padding:26px 18px 18px;
  }
  .ai-orb{
    width:62px;height:62px; margin:0 auto 14px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd27a, var(--amber) 60%, #b06f10);
    box-shadow:0 0 30px rgba(245,166,35,.35);
  }
  .ai-header h2{font-size:18px; font-weight:800; margin-bottom:4px;}
  .ai-header p{font-size:12.5px; color:var(--ink-dim);}

  .chat-area{padding:0 18px; display:flex; flex-direction:column; gap:12px; min-height:200px;}
  .msg{max-width:82%; padding:11px 14px; border-radius:14px; font-size:13.5px; line-height:1.55;}
  .msg.bot{background:var(--card); border:1px solid var(--line); align-self:flex-start; border-bottom-right-radius:4px;}
  .msg.user{background:var(--amber); color:var(--bg); align-self:flex-end; border-bottom-left-radius:4px; font-weight:500;}

  .quota-bar{
    margin:16px 18px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px;
  }
  .quota-top{display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px;}
  .quota-top b{color:var(--amber);}
  .quota-track{height:6px; background:var(--bg-elev); border-radius:4px; overflow:hidden;}
  .quota-fill{height:100%; background:var(--amber); border-radius:4px;}

  .chat-input-row{
    display:flex; gap:8px; padding:14px 18px 4px;
    position:sticky; bottom:0;
  }
  .chat-input-row input{
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:13px 16px; color:var(--ink); font-family:'Tajawal'; font-size:13.5px; outline:none;
  }
  .send-btn{
    width:46px;height:46px;border-radius:12px; background:var(--amber); border:none;
    color:var(--bg); font-size:16px; cursor:pointer; flex-shrink:0;
  }

  .upsell-card{
    margin:18px; background:linear-gradient(145deg, var(--card-2), var(--card));
    border:1px solid var(--amber-dim); border-radius:16px; padding:20px; text-align:center;
  }
  .upsell-card h4{font-size:16px; font-weight:800; margin-bottom:6px;}
  .upsell-card p{font-size:12.5px; color:var(--ink-dim); margin-bottom:16px; line-height:1.6;}
  .plan-row{display:flex; gap:10px; margin-bottom:14px;}
  .plan{
    flex:1; border:1px solid var(--line); border-radius:12px; padding:12px 8px;
    cursor:pointer; position:relative;
  }
  .plan.best{border-color:var(--amber);}
  .plan .badge{
    position:absolute; top:-9px; right:50%; transform:translateX(50%);
    background:var(--amber); color:var(--bg); font-size:9px; font-weight:800;
    padding:2px 8px; border-radius:6px; white-space:nowrap;
  }
  .plan b{display:block; font-family:'Oswald'; font-size:17px; margin:6px 0 2px;}
  .plan span{font-size:10.5px; color:var(--ink-dim);}
  .upsell-card button{
    width:100%; background:var(--amber); color:var(--bg); border:none;
    padding:13px; border-radius:10px; font-family:'Tajawal'; font-weight:800; font-size:14px;
    cursor:pointer;
  }

  /* ===== SETTINGS ===== */
  .settings-group{margin-bottom:22px;}
  .settings-label{font-size:11px; color:var(--ink-dim); margin-bottom:8px; padding:0 4px; text-transform:uppercase; letter-spacing:.05em; font-family:'Oswald';}
  .settings-card{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;}
  .setting-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:15px 16px; border-bottom:1px solid var(--line);
  }
  .setting-row:last-child{border-bottom:none;}
  .setting-row-left{display:flex; align-items:center; gap:12px;}
  .setting-icon{width:32px;height:32px;border-radius:8px; background:var(--card-2); display:flex;align-items:center;justify-content:center; font-size:15px;}
  .setting-label-text{font-size:14px; font-weight:600;}
  .setting-sub{font-size:11px; color:var(--ink-dim); margin-top:1px;}

  .lang-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:14px;}
  .lang-opt{
    display:flex; align-items:center; gap:8px; padding:11px 12px;
    border:1px solid var(--line); border-radius:10px; cursor:pointer; font-size:13px;
  }
  .lang-opt.selected{border-color:var(--amber); background:rgba(245,166,35,.08);}
  .lang-opt .flag{font-size:16px;}
  .lang-opt .lock{margin-right:auto; font-size:10px; color:var(--ink-dim);}

  .toggle{
    width:44px; height:25px; border-radius:13px; background:var(--card-2); border:1px solid var(--line);
    position:relative; cursor:pointer; flex-shrink:0;
  }
  .toggle.on{background:var(--amber); border-color:var(--amber);}
  .toggle::after{
    content:''; position:absolute; top:2px; right:2px; width:19px; height:19px; border-radius:50%;
    background:#fff; transition:transform .2s;
  }
  .toggle.on::after{transform:translateX(-19px);}

  .chev-icon{color:var(--ink-dim); font-size:16px;}

  .video-soon{font-size:11px; color:var(--ink-dim); margin-top:4px;}
  .empty-state{
    text-align:center; padding:50px 24px; color:var(--ink-dim);
  }
  .empty-state .e-icon{font-size:38px; margin-bottom:12px; display:block;}
  .empty-state h4{color:var(--ink); font-size:15px; margin-bottom:6px;}
  .empty-state p{font-size:12.5px; line-height:1.6;}
